{% extends "base.html" %}
{% block title %}Settings · Mitra Central{% endblock %}
{% block body %}
<div class="h-full flex">
  {% include "partials/sidebar.html" %}
  <div class="flex-1 flex flex-col">
    <header class="h-16 shrink-0 bg-white border-b border-slate-200 px-6 flex items-center">
      <div class="flex items-center gap-3">
        <div class="h-9 w-9 rounded-lg bg-brand-50 text-brand-700 flex items-center justify-center">
          <i data-lucide="settings" class="w-5 h-5"></i>
        </div>
        <div class="font-semibold text-slate-900">Settings</div>
      </div>
    </header>
    <main class="flex-1 overflow-y-auto px-6 py-8">
      <div class="max-w-lg mx-auto space-y-6">
        <form method="post" action="/settings" class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 space-y-5">
          {% if success %}
          <div class="bg-green-50 text-green-700 px-4 py-3 rounded-lg text-sm border border-green-100">Settings saved.</div>
          {% endif %}
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Row limit</label>
            <p class="text-xs text-slate-500 mb-2">Maximum number of rows returned by SQL queries (default: 50).</p>
            <input name="row_limit" type="number" min="1" max="500" value="{{ row_limit }}"
                   class="w-full rounded-lg border-slate-200 border px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500" />
          </div>
          <button type="submit"
                  class="w-full bg-brand-600 hover:bg-brand-700 text-white font-semibold py-2.5 rounded-lg transition shadow-lg shadow-brand-600/30">
            Save settings
          </button>
        </form>
      </div>
    </main>
  </div>
</div>
{% endblock %}
