{% extends "base.html" %}
{% block title %}{{ agent.name }} · Mitra Central{% endblock %}
{% block body %}
<div class="h-full flex">
  {% include "partials/sidebar.html" %}
  <div class="flex-1 flex flex-col" x-data="wsChat('{{ agent.route_prefix }}/ws', 'qadzone')" x-init="extraPayload = {mode: 'query'}">

    <div class="h-full flex flex-col">
      <header class="h-16 shrink-0 bg-white border-b border-slate-200 px-6 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="h-9 w-9 rounded-lg bg-brand-50 text-brand-700 flex items-center justify-center">
            <i data-lucide="{{ agent.icon }}" class="w-5 h-5"></i>
          </div>
          <div>
            <div class="font-semibold text-slate-900 leading-tight">{{ agent.name }}</div>
            <div class="text-xs text-slate-500">{{ agent.description }}</div>
          </div>
        </div>
        <!-- Mode tabs in header -->
        <div class="flex gap-1.5">
          <template x-for="m in [{key:'query',label:'Query',icon:'search'},{key:'documentation',label:'Docs',icon:'file-text'},{key:'modernisation',label:'Migrate',icon:'rocket'}]" :key="m.key">
            <button type="button"
                    @click="extraPayload.mode = m.key; $nextTick(() => lucide.createIcons())"
                    :class="extraPayload.mode === m.key ? 'bg-brand-50 border-brand-400 text-brand-700' : 'bg-white border-slate-200 text-slate-600 hover:border-slate-300'"
                    class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg border text-xs font-medium transition">
              <span x-text="m.label"></span>
            </button>
          </template>
        </div>
      </header>

      <main class="flex-1 overflow-y-auto px-6 py-6" x-ref="msgs">
        <template x-if="messages.length === 0">
          <div class="max-w-3xl mx-auto">
            <div class="text-center py-10">
              <div class="inline-flex h-14 w-14 rounded-2xl bg-gradient-to-br from-brand-500 to-brand-700 items-center justify-center shadow-lg shadow-brand-500/30 mb-4">
                <i data-lucide="{{ agent.icon }}" class="w-7 h-7 text-white"></i>
              </div>
              <h2 class="text-2xl font-bold text-slate-900">QAD-Zone</h2>
              <p class="text-slate-500 mt-1">Custom code knowledge base, documentation & modernisation.</p>
              <div class="mt-6 grid grid-cols-1 sm:grid-cols-3 gap-3 max-w-2xl mx-auto">
                <div class="bg-white border border-slate-200 rounded-xl p-4 text-left">
                  <div class="text-sm font-semibold text-slate-900 mb-1">Query</div>
                  <div class="text-xs text-slate-500">Ask questions about custom QAD programs</div>
                </div>
                <div class="bg-white border border-slate-200 rounded-xl p-4 text-left">
                  <div class="text-sm font-semibold text-slate-900 mb-1">Documentation</div>
                  <div class="text-xs text-slate-500">Generate Word docs from custom code</div>
                </div>
                <div class="bg-white border border-slate-200 rounded-xl p-4 text-left">
                  <div class="text-sm font-semibold text-slate-900 mb-1">Modernisation</div>
                  <div class="text-xs text-slate-500">Migration analysis between QAD versions</div>
                </div>
              </div>
            </div>
          </div>
        </template>

        <div class="max-w-4xl mx-auto space-y-6">
          <template x-for="(m, i) in messages" :key="i">
            <div>
              <template x-if="m.role === 'user'">
                <div class="flex justify-end">
                  <div class="bg-brand-600 text-white rounded-2xl rounded-br-sm px-5 py-3 max-w-[85%] whitespace-pre-wrap" x-text="m.text"></div>
                </div>
              </template>
              <template x-if="m.role === 'assistant'">
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 prose-container" x-html="m.html"></div>
              </template>
            </div>
          </template>
          <div x-show="streaming" class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5">
            <div x-show="statusText" class="flex items-center gap-2 text-sm text-brand-600 mb-2">
              <span class="inline-block w-2 h-2 rounded-full bg-brand-500 animate-pulse"></span>
              <span x-text="statusText"></span>
            </div>
            <div class="prose-container" x-html="currentHtml"></div>
            <span class="inline-block w-1.5 h-4 bg-brand-500 animate-pulse ml-0.5 align-middle"></span>
          </div>
          <div x-show="loading && !streaming" class="flex items-center gap-2 text-slate-500 text-sm">
            <span class="inline-block w-2 h-2 rounded-full bg-brand-500 animate-pulse"></span>
            <span>Thinking...</span>
          </div>
        </div>
      </main>

      <footer class="shrink-0 border-t border-slate-200 bg-white px-6 py-4">
        <div class="max-w-4xl mx-auto">
          <form @submit.prevent="send()" class="flex gap-2">
            <input x-model="input" type="text"
                   :placeholder="'Ask QAD-Zone (' + (extraPayload.mode || 'query') + ')...'"
                   :disabled="loading"
                   class="flex-1 rounded-xl border border-slate-200 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-brand-500 disabled:opacity-50" />
            <button type="submit" :disabled="!input.trim() || loading"
                    class="bg-brand-600 hover:bg-brand-700 disabled:opacity-40 text-white px-5 rounded-xl font-medium flex items-center gap-2">
              <i data-lucide="send" class="w-4 h-4"></i>
              <span>Send</span>
            </button>
          </form>
        </div>
      </footer>
    </div>

  </div>
</div>
{% include "partials/apex_widget.html" %}
{% endblock %}
