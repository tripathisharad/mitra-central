{% extends "base.html" %}
{% block title %}{{ agent.name }} · Mitra Central{% endblock %}
{% block body %}
<div class="h-full flex">
  {% include "partials/sidebar.html" %}

  <div class="flex-1 flex flex-col"
       x-data="qadZone('{{ agent.route_prefix }}/ws')"
       x-init="init()">

    <div class="h-full flex flex-col">

      <!-- ── Header ── -->
      <header class="h-14 shrink-0 bg-white border-b border-slate-200 px-6 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <span class="text-sm font-semibold text-slate-700">{{ agent.name }}</span>
          <span class="text-slate-300">|</span>
          <span class="text-sm text-slate-400">{{ agent.description }}</span>
        </div>

        <!-- Mode tabs -->
        <div class="flex gap-1.5">
          <template x-for="m in modes" :key="m.key">
            <button type="button"
                    @click="switchMode(m.key)"
                    :class="mode === m.key
                      ? 'bg-slate-100 border-slate-300 text-slate-800 font-semibold'
                      : 'bg-white border-slate-200 text-slate-500 hover:border-slate-300 hover:text-slate-700'"
                    class="px-3 py-1.5 rounded-lg border text-xs transition">
              <span x-text="m.label"></span>
            </button>
          </template>
        </div>
      </header>

      <!-- ── Main content area — relative for floating input ── -->
      <div class="flex-1 relative overflow-hidden">

        <!-- ── Scrollable area ── -->
        <main class="h-full overflow-y-auto" x-ref="msgs">

          <!-- ── Empty state (Query + Docs modes) ── -->
          <template x-if="messages.length === 0 && mode !== 'modernisation'">
            <div class="h-full flex flex-col items-center justify-center px-6 pb-32">

              <div class="text-center mb-8">
                <h1 class="text-3xl font-semibold text-slate-800 tracking-tight">QAD-Zone</h1>
                <p class="mt-2 text-sm text-slate-500 max-w-xl mx-auto leading-relaxed">
                  Custom code knowledge base, documentation &amp; modernisation.
                </p>
              </div>

              <!-- Mode cards -->
              <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 w-full max-w-2xl">

                <button @click="switchMode('query')"
                        class="group flex items-center gap-3 text-left bg-white border border-slate-200
                               rounded-lg p-4 hover:bg-slate-50 hover:border-slate-300 transition-all duration-150">
                  <div class="h-10 w-10 rounded bg-slate-100 group-hover:bg-slate-200 shrink-0 transition"></div>
                  <div>
                    <div class="text-sm font-medium text-slate-700">Query</div>
                    <div class="text-xs text-slate-400 mt-0.5">Ask about custom QAD programs</div>
                  </div>
                </button>

                <button @click="switchMode('documentation')"
                        class="group flex items-center gap-3 text-left bg-white border border-slate-200
                               rounded-lg p-4 hover:bg-slate-50 hover:border-slate-300 transition-all duration-150">
                  <div class="h-10 w-10 rounded bg-slate-100 group-hover:bg-slate-200 shrink-0 transition"></div>
                  <div>
                    <div class="text-sm font-medium text-slate-700">Documentation</div>
                    <div class="text-xs text-slate-400 mt-0.5">Generate Word docs from code</div>
                  </div>
                </button>

                <button @click="switchMode('modernisation')"
                        class="group flex items-center gap-3 text-left bg-white border border-slate-200
                               rounded-lg p-4 hover:bg-slate-50 hover:border-slate-300 transition-all duration-150">
                  <div class="h-10 w-10 rounded bg-slate-100 group-hover:bg-slate-200 shrink-0 transition"></div>
                  <div>
                    <div class="text-sm font-medium text-slate-700">Modernisation</div>
                    <div class="text-xs text-slate-400 mt-0.5">Migration analysis between versions</div>
                  </div>
                </button>

              </div>
            </div>
          </template>

          <!-- ── Modernisation Panel ── -->
          <template x-if="mode === 'modernisation'">
            <div class="max-w-2xl mx-auto px-6 py-8">

              <div class="bg-white border border-slate-200 rounded-xl shadow-sm p-8 mb-6">
                <div class="mb-6">
                  <h2 class="text-lg font-semibold text-slate-800">Migration Analysis</h2>
                  <p class="text-sm text-slate-500 mt-1">Select your QAD versions to generate a comprehensive migration plan</p>
                </div>

                <div class="space-y-5">
                  <!-- Current version -->
                  <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Current QAD Version</label>
                    <select x-model="modernForm.currentVersion"
                            class="w-full rounded-lg border border-slate-200 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 bg-white">
                      <option value="">Select current version...</option>
                      <optgroup label="QAD Enterprise Edition">
                        <option value="QAD EE 2.0">QAD EE 2.0</option>
                        <option value="QAD EE 2018">QAD EE 2018</option>
                        <option value="QAD EE 2019">QAD EE 2019</option>
                        <option value="QAD EE 2020">QAD EE 2020</option>
                        <option value="QAD EE 2021">QAD EE 2021</option>
                        <option value="QAD EE 2022">QAD EE 2022</option>
                        <option value="QAD EE 2023">QAD EE 2023</option>
                      </optgroup>
                      <optgroup label="QAD Community Edition">
                        <option value="QAD CE 2018">QAD CE 2018</option>
                        <option value="QAD CE 2019">QAD CE 2019</option>
                        <option value="QAD CE 2020">QAD CE 2020</option>
                        <option value="QAD CE 2021">QAD CE 2021</option>
                        <option value="QAD CE 2022">QAD CE 2022</option>
                      </optgroup>
                      <optgroup label="QAD Adaptive ERP">
                        <option value="QAD Adaptive ERP 2022">QAD Adaptive ERP 2022</option>
                        <option value="QAD Adaptive ERP 2023">QAD Adaptive ERP 2023</option>
                        <option value="QAD Adaptive ERP 2024">QAD Adaptive ERP 2024</option>
                      </optgroup>
                    </select>
                    <input x-model="modernForm.currentCustom" type="text"
                           placeholder="Or type a custom version (e.g. QAD EE 2.1 SP3)"
                           class="mt-2 w-full rounded-lg border border-slate-200 px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500" />
                  </div>

                  <!-- Arrow -->
                  <div class="flex items-center justify-center gap-3 text-slate-300">
                    <div class="h-px flex-1 bg-slate-200"></div>
                    <i data-lucide="arrow-down" class="w-4 h-4 text-slate-400"></i>
                    <div class="h-px flex-1 bg-slate-200"></div>
                  </div>

                  <!-- Target version -->
                  <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Target QAD Version</label>
                    <select x-model="modernForm.targetVersion"
                            class="w-full rounded-lg border border-slate-200 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 bg-white">
                      <option value="">Select target version...</option>
                      <optgroup label="QAD Enterprise Edition">
                        <option value="QAD EE 2019">QAD EE 2019</option>
                        <option value="QAD EE 2020">QAD EE 2020</option>
                        <option value="QAD EE 2021">QAD EE 2021</option>
                        <option value="QAD EE 2022">QAD EE 2022</option>
                        <option value="QAD EE 2023">QAD EE 2023</option>
                      </optgroup>
                      <optgroup label="QAD Adaptive ERP">
                        <option value="QAD Adaptive ERP 2022">QAD Adaptive ERP 2022</option>
                        <option value="QAD Adaptive ERP 2023">QAD Adaptive ERP 2023</option>
                        <option value="QAD Adaptive ERP 2024">QAD Adaptive ERP 2024</option>
                      </optgroup>
                    </select>
                    <input x-model="modernForm.targetCustom" type="text"
                           placeholder="Or type a custom version"
                           class="mt-2 w-full rounded-lg border border-slate-200 px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500" />
                  </div>
                </div>

                <!-- Generate button -->
                <button @click="sendModernisation()"
                        :disabled="loading || (!modernForm.currentVersion && !modernForm.currentCustom) || (!modernForm.targetVersion && !modernForm.targetCustom)"
                        class="mt-6 w-full bg-brand-800 hover:bg-brand-900 disabled:opacity-40 disabled:cursor-not-allowed
                               text-white font-medium py-3 rounded-lg flex items-center justify-center gap-2 transition text-sm">
                  <template x-if="!loading">
                    <span class="flex items-center gap-2">
                      <i data-lucide="rocket" class="w-4 h-4"></i>
                      Generate Migration Plan
                    </span>
                  </template>
                  <template x-if="loading">
                    <span class="flex items-center gap-2">
                      <span class="inline-block w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></span>
                      Analysing...
                    </span>
                  </template>
                </button>
              </div>

              <!-- Result -->
              <template x-if="modernResult">
                <div class="bg-white border border-slate-200 rounded-xl shadow-sm p-6">
                  <div x-show="streaming" class="mb-4">
                    <div x-show="statusText" class="flex items-center gap-2 text-sm text-brand-600 mb-3">
                      <span class="inline-block w-2 h-2 rounded-full bg-brand-500 animate-pulse"></span>
                      <span x-text="statusText"></span>
                    </div>
                    <div class="prose-container" x-html="currentHtml"></div>
                    <span class="inline-block w-1.5 h-4 bg-brand-500 animate-pulse ml-0.5 align-middle"></span>
                  </div>
                  <div x-show="!streaming" class="prose-container" x-html="modernResult"></div>
                </div>
              </template>

              <template x-if="!modernResult && loading">
                <div class="bg-white border border-slate-200 rounded-xl shadow-sm p-6">
                  <div x-show="statusText" class="flex items-center gap-2 text-sm text-brand-600 mb-3">
                    <span class="inline-block w-2 h-2 rounded-full bg-brand-500 animate-pulse"></span>
                    <span x-text="statusText"></span>
                  </div>
                  <div class="prose-container" x-html="currentHtml"></div>
                  <span x-show="streaming" class="inline-block w-1.5 h-4 bg-brand-500 animate-pulse ml-0.5 align-middle"></span>
                </div>
              </template>

            </div>
          </template>

          <!-- ── Chat messages (Query + Docs) ── -->
          <template x-if="mode !== 'modernisation'">
            <div class="max-w-4xl mx-auto px-6 py-6 space-y-6">
              <template x-for="(m, i) in messages" :key="i">
                <div>
                  <template x-if="m.role === 'user'">
                    <div class="flex justify-end">
                      <div class="bg-brand-600 text-white rounded-2xl rounded-br-sm px-5 py-3 max-w-[85%] whitespace-pre-wrap" x-text="m.text"></div>
                    </div>
                  </template>
                  <template x-if="m.role === 'assistant'">
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 prose-container" x-html="m.html"></div>
                  </template>
                </div>
              </template>

              <div x-show="streaming" class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5">
                <div x-show="statusText" class="flex items-center gap-2 text-sm text-brand-600 mb-2">
                  <span class="inline-block w-2 h-2 rounded-full bg-brand-500 animate-pulse"></span>
                  <span x-text="statusText"></span>
                </div>
                <div class="prose-container" x-html="currentHtml"></div>
                <span class="inline-block w-1.5 h-4 bg-brand-500 animate-pulse ml-0.5 align-middle"></span>
              </div>

              <div x-show="loading && !streaming" class="flex items-center gap-2 text-slate-500 text-sm">
                <span class="inline-block w-2 h-2 rounded-full bg-brand-500 animate-pulse"></span>
                <span>Thinking...</span>
              </div>

              <!-- Bottom padding so messages don't hide behind floating input -->
              <div class="h-24"></div>
            </div>
          </template>

        </main>

        <!-- ── Floating input (hidden in modernisation mode) ── -->
        <div x-show="mode !== 'modernisation'"
             class="absolute bottom-8 left-1/2 -translate-x-1/2 w-full max-w-2xl px-4">
          <div class="relative flex items-center bg-white border border-slate-200 rounded-xl shadow-sm px-3 py-2">
            <input x-model="input" type="text"
                   @keydown.enter.prevent="sendChat()"
                   :placeholder="mode === 'documentation'
                     ? 'e.g. Create documentation for the DOA module...'
                     : 'Ask about custom QAD programs...'"
                   :disabled="loading"
                   class="flex-1 text-sm outline-none bg-transparent placeholder:text-slate-400 disabled:opacity-50 py-1" />
            <button @click="sendChat()"
                    :disabled="!input.trim() || loading"
                    class="ml-2 h-8 w-16 rounded-lg bg-brand-800 hover:bg-brand-900
                           disabled:opacity-40 text-white text-sm flex items-center justify-center shrink-0 transition">
              <i data-lucide="send" class="w-3.5 h-3.5"></i>
            </button>
          </div>
          <p class="text-center text-xs text-slate-400 mt-2">
            <template x-if="mode === 'documentation'">
              <span>Tip: Specify the module name, e.g. <em>"Document the DOA approval module"</em></span>
            </template>
            <template x-if="mode === 'query'">
              <span>Tip: Ask specific questions, e.g. <em>"What does xxdoaproc.p do?"</em></span>
            </template>
          </p>
        </div>

      </div><!-- end relative wrapper -->

    </div>
  </div>
</div>

{% include "partials/apex_widget.html" %}

<script>
function qadZone(wsPath) {
  return {
    mode: 'query',
    modes: [
      { key: 'query',         label: 'Query',   icon: 'search'    },
      { key: 'documentation', label: 'Docs',    icon: 'file-text' },
      { key: 'modernisation', label: 'Migrate', icon: 'rocket'    },
    ],

    input: '',
    loading: false,
    streaming: false,
    statusText: '',
    messages: [],
    currentText: '',
    currentHtml: '',
    currentDoc: null,
    currentFollowups: null,
    ws: null,

    modernForm: {
      currentVersion: '',
      currentCustom: '',
      targetVersion: '',
      targetCustom: '',
    },
    modernResult: null,

    init() {
      this.$el.addEventListener('click', (e) => {
        const chip = e.target.closest('[data-followup]');
        if (chip && !this.loading && this.mode !== 'modernisation') {
          this.input = chip.dataset.followup;
          this.sendChat();
        }
      });
      this.$nextTick(() => window.lucide && lucide.createIcons());
    },

    switchMode(key) {
      this.mode = key;
      this._resetStream();
      this.$nextTick(() => window.lucide && lucide.createIcons());
    },

    sendChat() {
      const q = (this.input || '').trim();
      if (!q || this.loading) return;
      this.input = '';
      this.messages.push({ role: 'user', text: q });
      this._resetStream();
      this.loading = true;
      this.$nextTick(() => this.scrollBottom());

      const ws = new WebSocket(buildWsUrl(wsPath));
      this.ws = ws;
      ws.onopen = () => { ws.send(JSON.stringify({ mode: this.mode, question: q })); };
      ws.onmessage = (evt) => {
        let frame; try { frame = JSON.parse(evt.data); } catch (_) { return; }
        this._handleFrame(frame, 'chat');
      };
      ws.onerror = () => { this._finalizeChat('<div class="text-red-600 text-sm">Connection error. Please try again.</div>'); };
      ws.onclose = () => { if (this.loading) this._finalizeChat(this._buildChatHtml()); };
    },

    sendModernisation() {
      const current = (this.modernForm.currentCustom || this.modernForm.currentVersion || '').trim();
      const target  = (this.modernForm.targetCustom  || this.modernForm.targetVersion  || '').trim();
      if (!current || !target || this.loading) return;
      this._resetStream();
      this.modernResult = null;
      this.loading = true;

      const ws = new WebSocket(buildWsUrl(wsPath));
      this.ws = ws;
      ws.onopen = () => { ws.send(JSON.stringify({ mode: 'modernisation', current_version: current, target_version: target })); };
      ws.onmessage = (evt) => {
        let frame; try { frame = JSON.parse(evt.data); } catch (_) { return; }
        this._handleFrame(frame, 'modernisation');
      };
      ws.onerror = () => { this.modernResult = '<div class="text-red-600 text-sm">Connection error. Please try again.</div>'; this.loading = false; this.streaming = false; };
      ws.onclose = () => { if (this.loading) this._finalizeModernisation(this._buildChatHtml()); };
    },

    _handleFrame(frame, target) {
      const { type, data } = frame;
      switch (type) {
        case 'token':
          if (!this.streaming) this.streaming = true;
          this.currentText += data;
          this.currentHtml = renderMarkdown(this.currentText);
          this.$nextTick(() => this.scrollBottom());
          break;
        case 'status': this.statusText = data; break;
        case 'doc':    this.currentDoc = data; break;
        case 'followup': this.currentFollowups = data; break;
        case 'error':
          if (target === 'modernisation') this._finalizeModernisation(`<div class="text-red-600 text-sm">${escapeHtml(data)}</div>`);
          else this._finalizeChat(`<div class="text-red-600 text-sm">${escapeHtml(data)}</div>`);
          break;
        case 'done':
          if (target === 'modernisation') this._finalizeModernisation(this._buildChatHtml());
          else this._finalizeChat(this._buildChatHtml());
          break;
      }
    },

    _buildChatHtml() {
      let html = '';
      if (this.currentText) html += `<div class="prose-content">${renderMarkdown(this.currentText)}</div>`;
      html += renderDoc(this.currentDoc);
      html += renderFollowups(this.currentFollowups);
      return html || '<div class="text-slate-500 text-sm italic">No response received.</div>';
    },

    _finalizeChat(html)         { this.messages.push({ role: 'assistant', html }); this._done(); },
    _finalizeModernisation(html){ this.modernResult = html; this._done(); },

    _done() {
      this.loading = false; this.streaming = false; this.statusText = '';
      if (this.ws) { try { this.ws.close(); } catch (_) {} this.ws = null; }
      this.$nextTick(() => { this.scrollBottom(); if (window.lucide) lucide.createIcons(); });
    },

    _resetStream() {
      this.streaming = false; this.statusText = ''; this.currentText = '';
      this.currentHtml = ''; this.currentDoc = null; this.currentFollowups = null;
    },

    scrollBottom() { const el = this.$refs.msgs; if (el) el.scrollTop = el.scrollHeight; },
  };
}
window.qadZone = qadZone;
</script>
{% endblock %}
