{% extends "base.html" %}
{% block title %}Sign in · Mitra{% endblock %}
{% block body %}
<div class="min-h-full flex items-center justify-center px-4">
  <div class="w-full max-w-md">
    <div class="flex items-center justify-center mb-6">
      <div class="h-12 w-12 rounded-xl bg-brand-800 flex items-center justify-center shadow-lg">
        <i data-lucide="sparkles" class="text-white w-6 h-6"></i>
      </div>
    </div>
    <h1 class="text-center text-3xl font-bold text-slate-900">Welcome to Mitra</h1>
    <p class="text-center text-slate-500 mt-2">Your AI copilot for QAD ERP</p>

    <form method="post" action="/login" class="mt-8 bg-white rounded-2xl shadow-xl shadow-slate-200/60 p-8 space-y-5 border border-slate-100">
      {% if error %}
      <div class="bg-red-50 text-red-700 px-4 py-3 rounded-lg text-sm border border-red-100">{{ error }}</div>
      {% endif %}
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Username</label>
        <input name="username" type="text" required autofocus
               class="w-full rounded-lg border-slate-200 border px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500" />
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
        <input name="password" type="password" required
               class="w-full rounded-lg border-slate-200 border px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500" />
      </div>
      <button type="submit"
              class="w-full bg-brand-800 hover:bg-brand-900 text-white font-semibold py-2.5 rounded-lg transition shadow-lg">
        Sign in
      </button>
    </form>
    <p class="text-center text-xs text-slate-400 mt-6">© Mitra Central</p>
  </div>
</div>
{% endblock %}
